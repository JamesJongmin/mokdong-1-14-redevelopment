<style>
  :root{--ink:#16202c;--slate:#33475b;--mute:#6b7a8d;--line:#e2e8ef;--paper:#f7f9fb;--brand:#1f4e79;--brick:#c2410c}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);line-height:1.8;font-size:17px}
  a{color:var(--brand)}
  .bar{height:6px;background:linear-gradient(90deg,var(--brand),var(--brick))}
  .wrap{max-width:760px;margin:0 auto;padding:48px 22px 80px}
  .back{font-size:.9rem;color:var(--mute);font-weight:500}
  .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:.85rem;color:var(--mute);margin:24px 0 10px}
  .badge{font-size:.74rem;font-weight:700;color:#fff;background:var(--brand);padding:3px 10px;border-radius:999px}
  h1{font-family:'Gowun Batang',serif;font-size:clamp(1.8rem,4.5vw,2.5rem);line-height:1.25;margin:6px 0 10px}
  .sub{font-size:1.1rem;color:var(--slate);margin-bottom:28px}
  h2{font-family:'Gowun Batang',serif;font-size:1.5rem;margin:44px 0 14px;padding-bottom:10px;border-bottom:2px solid var(--brick)}
  h3{font-size:1.1rem;font-weight:700;color:var(--brand);margin:28px 0 10px}
  p{margin-bottom:16px} ul{margin:0 0 16px 22px} li{margin-bottom:8px}
  .box{background:#eef5ff;border-left:4px solid var(--brand);padding:18px 22px;border-radius:0 10px 10px 0;margin:24px 0}
  .imp{background:#fff5ee;border-left:4px solid var(--brick);padding:18px 22px;border-radius:0 10px 10px 0;margin:24px 0}
  table{width:100%;border-collapse:collapse;margin:20px 0;font-size:.92rem}
  th{background:#eef2f7;text-align:left;padding:10px 12px;border-bottom:2px solid var(--brand)}
  td{padding:10px 12px;border-bottom:1px solid var(--line)}
  footer{border-top:1px solid var(--line);margin-top:50px;padding-top:20px;font-size:.82rem;color:var(--mute)}
</style>
</head>
<body>
<div class="bar"></div>
<div class="wrap">
